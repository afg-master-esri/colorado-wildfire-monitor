name: Colorado Wildfire Monitor — NASA FIRMS Update

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-fire-data:
    name: Update NASA FIRMS hotspots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Download and publish fire hotspots
        env:
          NASA_FIRMS_API_KEY: ${{ secrets.NASA_FIRMS_API_KEY }}
          AGOL_USERNAME:      ${{ secrets.AGOL_USERNAME }}
          AGOL_PASSWORD:      ${{ secrets.AGOL_PASSWORD }}
          AGOL_LAYER_ID:      ${{ secrets.AGOL_LAYER_ID }}
        run: python firms_update.py
